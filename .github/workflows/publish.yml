name: Publish Scheduled Articles

on:
  schedule:
    - cron: '17 14 * * *'  # 9:17am Central Time daily
  workflow_dispatch:        # Also lets you trigger it manually from GitHub

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish articles due today
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          echo "Today is: $TODAY"

          PUBLISHED=0

          mkdir -p blog
          mkdir -p scheduled

          for file in scheduled/*.html; do
            [ -f "$file" ] || continue

            FILENAME=$(basename "$file")
            echo "Found: scheduled/$FILENAME"

            FILE_DATE=$(echo "$FILENAME" | cut -c1-10)
            echo "File date: $FILE_DATE"

            if ! echo "$FILE_DATE" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
              echo "Skipping $FILENAME — no valid date prefix"
              continue
            fi

            EARLIEST=$(printf '%s\n' "$FILE_DATE" "$TODAY" | sort | head -n1)

            if [ "$EARLIEST" = "$FILE_DATE" ]; then
              SLUG=$(echo "$FILENAME" | cut -c12-)
              echo "Publishing $SLUG"

              cp "$file" "blog/$SLUG"
              rm "$file"

              PUBLISHED=$((PUBLISHED + 1))

              SLUG_URL="https://vadisability.org/blog/$SLUG"
              if ! grep -q "$SLUG" sitemap.xml; then
                sed -i "s|</urlset>|  <url>\n    <loc>$SLUG_URL</loc>\n    <changefreq>monthly</changefreq>\n    <priority>0.8</priority>\n  </url>\n</urlset>|" sitemap.xml
                echo "Added to sitemap: $SLUG_URL"
              fi
            else
              echo "Not due yet: $FILENAME"
            fi
          done

          echo "Articles published today: $PUBLISHED"

          if [ "$PUBLISHED" -gt 0 ]; then
            git config user.name "VA Disability Bot"
            git config user.email "action@github.com"
            git add blog/ sitemap.xml scheduled/
            git commit -m "Published $PUBLISHED article(s) for $TODAY"
            git push
            echo "Deployed successfully"
          else
            echo "Nothing to publish today"
          fi
